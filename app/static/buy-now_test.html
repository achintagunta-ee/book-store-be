<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buy Now – Razorpay Test (Local)</title>

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        pre {
            background: #f4f4f4;
            padding: 12px;
            margin-top: 20px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h2>⚡ Buy Now Checkout (Razorpay Test – Local)</h2>

<button onclick="startBuyNow()">💳 Pay Now</button>

<pre id="output">Click "Pay Now"</pre>

<script>
/**
 * ✅ LOCAL API BASE
 */
/* const API_BASE = "https://hbn-be.efficientemengineering.com/book"; */

const API_BASE = "http://localhost:8000/book";
/**
 * 🔐 LOCAL USER JWT TOKEN
 * Generate this from localhost login
 */
const USER_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoxLCJleHAiOjE3Nzc2MzM4MzB9.o7ZzQD73F-nGzkkrQw0pjYy_tHfr9kaXyE_-w0XA6yc";

async function startBuyNow() {
    const output = document.getElementById("output");
    output.innerText = "🛒 Creating Buy Now order...";

    try {
        const res = await fetch(`${API_BASE}/buy-now`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${USER_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                book_id: 1,      // 🔁 change if needed
                quantity: 1,
                address_id: 2    // 🔁 valid local address ID
            })
        });

        if (!res.ok) {
            const errText = await res.text();
            throw new Error(errText);
        }

        const data = await res.json();
        console.log("Buy Now response:", data);

        output.innerText =
            "✅ Order Created\n\n" +
            JSON.stringify(data, null, 2);

        const options = {
            key: data.razorpay_key,
            amount: Math.round(data.amount * 100), // rupees → paise
            currency: "INR",
            name: "Hithabodha Bookstore",
            description: "Buy Now Purchase",
            order_id: data.razorpay_order_id,

            handler: function (response) {
                output.innerText =
                    "🎉 Razorpay Payment Success\n\n" +
                    JSON.stringify(response, null, 2);

                verifyBuyNowPayment(data.order_id, response);
            },

            prefill: {
                name: data.user_name,
                email: data.user_email
            },

            theme: {
                color: "#3399cc"
            }
        };

        new Razorpay(options).open();

    } catch (err) {
        console.error(err);
        output.innerText = "❌ Error: " + err.message;
    }
}

async function verifyBuyNowPayment(orderId, response) {
    const output = document.getElementById("output");

    try {
        const res = await fetch(`${API_BASE}/buy-now/verify-payment`, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${USER_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                order_id: orderId,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_order_id: response.razorpay_order_id,
                razorpay_signature: response.razorpay_signature
            })
        });

        if (!res.ok) {
            const errText = await res.text();
            throw new Error(errText);
        }

        const result = await res.json();

        output.innerText +=
            "\n\n✅ Backend Verification Success\n\n" +
            JSON.stringify(result, null, 2);

    } catch (err) {
        console.error(err);
        output.innerText += "\n\n❌ Verification failed: " + err.message;
    }
}
</script>

</body>
</html>
